<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageOpt | Professional Image Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .progress { height: 10px; background-color: #334155; }
        .btn-primary { background-color: #3b82f6; border: none; font-weight: 600; }
        .btn-primary:hover { background-color: #2563eb; }
        .status-badge { font-size: 0.8rem; padding: 0.4rem 0.8rem; border-radius: 20px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="text-center mb-5">
                <h1 class="display-4 fw-bold text-white">Image<span class="text-primary">Opt</span></h1>
                <p class="text-secondary">Fast, distributed WebP optimization</p>
            </div>

            <div class="card shadow-lg p-4">
                <div class="mb-4">
                    <label for="imageInput" class="form-label text-secondary small text-uppercase fw-bold">Select Image (JPG/PNG)</label>
                    <input class="form-control form-control-lg" type="file" id="imageInput" accept="image/*">
                </div>

                <button id="uploadBtn" onclick="uploadFile()" class="btn btn-primary btn-lg w-100 shadow-sm">
                    Optimize Now
                </button>

                <div id="processingSection" class="mt-4" style="display: none;">
                    <div class="d-flex justify-content-between mb-2">
                        <span id="statusText" class="small fw-bold text-secondary">Uploading...</span>
                        <span id="percentText" class="small text-secondary">0%</span>
                    </div>
                    <div class="progress mb-3">
                        <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"></div>
                    </div>
                </div>

                <div id="resultSection" class="mt-4 text-center" style="display: none;">
                    <div class="alert alert-success d-flex align-items-center justify-content-between p-3 border-0">
                        <span class="small fw-medium">✨ Optimization Complete!</span>
                        <a id="downloadLink" class="btn btn-sm btn-success fw-bold px-3" download>Download WebP</a>
                    </div>
                </div>
            </div>

            <p class="text-center mt-4 text-secondary small">
                Handled by Symfony + Go + RabbitMQ
            </p>
        </div>
    </div>
</div>

<script>
    async function uploadFile() {
        const fileInput = document.getElementById('imageInput');
        const file = fileInput.files[0];
        if (!file) return;

        // Reset UI
        const uploadBtn = document.getElementById('uploadBtn');
        const processingSection = document.getElementById('processingSection');
        const resultSection = document.getElementById('resultSection');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const percentText = document.getElementById('percentText');

        uploadBtn.disabled = true;
        processingSection.style.display = 'block';
        resultSection.style.display = 'none';

        const formData = new FormData();
        formData.append('image', file);

        try {
            const response = await axios.post('/upload', formData, {
                onUploadProgress: (p) => {
                    let percent = Math.round((p.loaded * 100) / p.total);
                    progressBar.style.width = percent + '%';
                    percentText.innerText = percent + '%';
                    if (percent === 100) statusText.innerText = 'Converting to WebP...';
                }
            });

            pollForResult(response.data.webpName);

        } catch (e) {
            statusText.innerText = 'Error uploading file.';
            uploadBtn.disabled = false;
        }
    }

    function pollForResult(filename) {
    const interval = setInterval(async () => {
        try {
            const res = await fetch('/check-status/' + filename);
            
            if (res.status === 200) {
                clearInterval(interval);
                document.getElementById('statusText').innerText = 'Done!';
                document.getElementById('resultSection').style.display = 'block';
                
                document.getElementById('downloadLink').href = '/downloads/' + filename;
                document.getElementById('uploadBtn').disabled = false;
            }
        } catch (e) { console.error(e); }
    }, 1500);
}
</script>

</body>
</html>
